<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}CADFlow{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">CADFlow</a>
        <div class="d-flex gap-2">
          {% if user.is_authenticated %}
            <span class="navbar-text text-white-50">Olá, {{ user.username }}</span>
            <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Sair</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% if messages %}
        {% for m in messages %}
          <div class="alert alert-{{ m.tags }} mb-3">{{ m }}</div>
        {% endfor %}
      {% endif %}

      {% block content %}{% endblock %}
    </main>

  </body>
</html>
