services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: cadflow
      POSTGRES_USER: cadflow_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadflow_app -d cadflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://cadflow_app:${POSTGRES_PASSWORD}@db:5432/cadflow
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      MEDIA_ROOT: /data/storage
    volumes:
      - .:/app
      - storage:/data/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["bash","-lc","python manage.py migrate && gunicorn cadflow.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"]

volumes:
  db_data:
  storage: